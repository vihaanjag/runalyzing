<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.header{background:#111;color:#fff;padding:20px 20px 16px;flex-shrink:0}
.header-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.header-title{font-size:20px;font-weight:600;margin-bottom:12px}
.progress-track{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;opacity:.5;margin-top:5px}
.body{padding:24px 20px;flex:1}
.step-label{font-size:17px;font-weight:600;margin-bottom:4px}
.step-hint{font-size:12px;color:#888;margin-bottom:6px}
.multi-hint{font-size:11px;color:#aaa;margin-bottom:16px;font-style:italic}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{width:100%;padding:12px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;text-align:left;transition:all .12s;display:flex;align-items:center;gap:10px;color:#222}
.opt:hover{border-color:#bbb;background:#fafafa}
.opt.sel{border:1.5px solid #111;background:#111;color:#fff}
.check{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.opt.sel .check{background:#fff;border-color:#fff;color:#111}
.slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.slider-label{font-size:13px;color:#666}
.slider-val{font-size:20px;font-weight:600}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;background:#e0e0e0;outline:none;margin-bottom:8px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#111;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#111;cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.slider-ticks{display:flex;justify-content:space-between;font-size:10px;color:#bbb;margin-bottom:20px}
.btn-primary{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px}
.btn-primary:hover{background:#333}
.btn-back{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;margin-top:16px;padding:0;display:block}
.results-header{background:#111;color:#fff;padding:20px 20px 16px}
.results-body{padding:16px}
.card{border:1px solid #e0e0e0;border-radius:12px;margin-bottom:12px;overflow:hidden}
.card.top{border:2px solid #111}
.card-badge{background:#f0f0f0;padding:4px 12px;font-size:10px;font-weight:600;color:#555;letter-spacing:.06em;border-bottom:1px solid #e0e0e0}
.card-body{padding:14px}
.card-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.brand-name{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.shoe-name{font-size:15px;font-weight:600}
.price-block{text-align:right}
.price-usd{font-size:15px;font-weight:600}
.price-cad{font-size:11px;color:#888;margin-top:1px}
.match-pct{font-size:10px;color:#aaa;margin-top:1px}
.best-for{font-size:12px;color:#666;line-height:1.5;margin-bottom:10px}
.pills{margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px}
.pill{display:inline-block;font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid #e0e0e0;color:#555}
.expand-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#888;padding:0}
.specs{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.spec-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #f8f8f8}
.spec-k{color:#aaa}
.spec-v{color:#222;font-weight:500;text-align:right;max-width:62%}
.restart-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.disclaimer{font-size:10px;color:#bbb;text-align:center;margin-top:12px;line-height:1.6}
</style>

  step:0,

  expanded:null

// ── Conditional step logic ───────────────────────────────────────────────────
function condMet(step){
  if(!step.conditional)return true;
  const c=step.conditional;
  const val=state.profile[c.key];
  if(c.includesAny){
    return Array.isArray(val)?c.includesAny.some(x=>val.includes(x)):c.includesAny.includes(val);
  }
  return true;
}
function activeSteps(){return STEPS.filter(s=>condMet(s));}
function advance(){
  const a=activeSteps(),ci=a.findIndex(s=>s.id===STEPS[state.step].id);
  if(ci<a.length-1){state.step=STEPS.findIndex(s=>s.id===a[ci+1].id);render();}
}
function goBack(){
  const a=activeSteps(),ci=a.findIndex(s=>s.id===STEPS[state.step].id);
  if(ci>0){state.step=STEPS.findIndex(s=>s.id===a[ci-1].id);render();}
}

// ── Helpers ──────────────────────────────────────────────────────────────────
function isMultiStep(id){const s=STEPS.find(x=>x.id===id);return s&&s.multi;}
function isSel(key,val){return isMultiStep(key)?(state.profile[key]||[]).includes(val):state.profile[key]===val;}
function hasSel(key){return isMultiStep(key)?(state.profile[key]||[]).length>0:!!state.profile[key];}

function toggleVal(key,val){
  if(isMultiStep(key)){
    const step=STEPS.find(s=>s.id===key);
    const max=step&&step.max?step.max:99;
    let arr=[...(state.profile[key]||[])];
    const i=arr.indexOf(val);
    if(i>=0){arr.splice(i,1);}
    else if(key==="brand"&&val==="none"){arr=["none"];}
    else if(key==="brand"&&arr.includes("none")){arr=arr.filter(x=>x!=="none");if(arr.length<max)arr.push(val);}
    else if(arr.length<max){arr.push(val);}
    state.profile[key]=arr;
    render();
  }else{
    state.profile[key]=val;
    render();
    setTimeout(()=>{advance();},180);
  }
}

// ── Scoring ──────────────────────────────────────────────────────────────────
function isStab(shoe){return shoe.support==="Stability"||shoe.support==="Max Stability";}
function needsStab(p){return["mild-over","moderate-over","high-over"].includes(p.gait);}
function isPlated(shoe){
  const pl=shoe.plate||"";
  return pl!=="None"&&!pl.startsWith("None (")&&pl.length>0;
}

function score(shoe,p){
  if(isStab(shoe)&&!needsStab(p))return -999;

  let s=0;
  const pur=p.purpose.length?p.purpose:["daily"];
  if(pur.includes("versatile")&&shoe.purpose.some(x=>["daily","performance","recovery"].includes(x)))s+=20;
  if(pur.includes("race")&&shoe.purpose.includes("race"))s+=20;
  if(pur.includes("daily")&&shoe.purpose.includes("daily"))s+=15;
  if(pur.includes("speed")&&shoe.purpose.some(x=>["performance","race"].includes(x)))s+=15;
  if(pur.includes("recovery")&&shoe.purpose.includes("recovery"))s+=18;
  if(pur.includes("new")&&shoe.purpose.includes("daily"))s+=20;

  const dists=p.distance.length?p.distance:[];
  if(dists.length>0&&dists.some(d=>shoe.dist.includes(d)))s+=12;

  const plated=isPlated(shoe);
  if(p.plate==="plated"){if(plated)s+=18;else s-=20;}
  if(p.plate==="nonplated"){
    if(!plated){s+=12;if(shoe.foamT.includes("snappy")||shoe.foamT.includes("springy"))s+=8;}
    else s-=20;
  }

  if(p.gait==="neutral"&&shoe.gait.includes("neutral"))s+=12;
  else if(p.gait==="mild-over"&&isStab(shoe))s+=15;
  else if(p.gait==="moderate-over"&&isStab(shoe))s+=18;
  else if(p.gait==="high-over"&&shoe.support==="Max Stability")s+=20;
  else if(p.gait==="supination"&&shoe.gait.includes("neutral"))s+=8;
  else if(p.gait==="unknown")s+=5;

  if(p.footstrike==="heel"&&shoe.gait.includes("heel"))s+=5;
  if(p.footstrike==="fore"&&shoe.drop<=6)s+=5;
  if(p.footstrike==="mid"&&shoe.drop<=8)s+=3;

  if(shoe.widths.includes(p.width))s+=8;

  const feels=p.feel.length?p.feel:["balanced"];
  if(feels.includes("plush")){if(shoe.cushion==="max")s+=14;if(shoe.foamT.includes("soft"))s+=6;}
  if(feels.includes("balanced")){if(shoe.cushion==="medium")s+=14;if(shoe.foamT.includes("snappy")||shoe.foamT.includes("springy"))s+=6;}
  if(feels.includes("light")){if(shoe.cushion==="light")s+=14;if(shoe.foamT.includes("firm"))s+=6;}
  if(feels.includes("bouncy")){if(shoe.foamT.includes("springy")||shoe.foamT.includes("snappy"))s+=14;if(shoe.cushion!=="light")s+=4;}

  const brands=p.brand||[];
  if(brands.length>0&&!brands.includes("none")){if(brands.includes(shoe.brand))s+=20;else s-=30;}

  const budUSD=Math.round(p.budget/CAD);
  if(shoe.priceUSD<=budUSD)s+=10;else if(shoe.priceUSD<=budUSD*1.1)s+=5;

  if(p.weekly>=60&&shoe.cushion==="max")s+=5;
  if(p.weekly>=80&&shoe.cushion==="max")s+=3;
  if(p.weekly<25&&shoe.cushion==="light")s+=3;

  return s;
}

function pct(n){return Math.min(97,Math.round(n/1.4));}

function getResults(){
  const scored=DB.map(sh=>({...sh,_s:score(sh,state.profile)}))
    .filter(sh=>sh._s>-100)
    .sort((a,b)=>b._s-a._s)
    .slice(0,5);
  state.results=scored;
  render();
}

function restart(){
  state={step:0,profile:{gender:"",purpose:[],distance:[],plate:"",gait:"",footstrike:"",width:"",feel:[],brand:[],weekly:20,budget:250},results:null,expanded:null};
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(!app)return;

  if(state.results){
    let h=`<div class="results-header"><div class="header-label">Your top matches</div><div class="header-title">Recommended shoes</div></div><div class="results-body">`;
    state.results.forEach((shoe,i)=>{
      const bc=BC[shoe.brand]||"#333";
      const isTop=i===0;
      const isExp=state.expanded===shoe.id;
      const cadPrice=shoe.priceCAD||Math.round(shoe.priceUSD*CAD);
      const cadLabel=shoe.priceCAD?"actual":"~";
      const plated=isPlated(shoe);
      const cushLabel=shoe.cushion==="max"?"Max cushion":shoe.cushion==="light"?"Light cushion":"Med cushion";
      h+=`<div class="card${isTop?" top":""}">`;
      if(isTop)h+=`<div class="card-badge">TOP PICK</div>`;
      h+=`<div class="card-body">
        <div class="card-row1">
          <div><div class="brand-name" style="color:${bc}">${shoe.brand}</div><div class="shoe-name">${shoe.model}</div></div>
          <div class="price-block">
            <div class="price-usd">$${shoe.priceUSD} USD</div>
            <div class="price-cad">${cadLabel} $${cadPrice} CAD</div>
            <div class="match-pct">${pct(shoe._s)}% match</div>
          </div>
        </div>
        <div class="best-for">${shoe.best}</div>
        <div class="pills">
          <span class="pill">${cushLabel}</span>
          <span class="pill">${shoe.feel}</span>
          <span class="pill">Drop ${shoe.drop}mm</span>
          <span class="pill">${shoe.support}</span>
          <span class="pill">${plated?"Plated":"No plate"}</span>
        </div>
        <button class="expand-btn" onclick="toggleExpand(${shoe.id})">${isExp?"▲ Less":"▼ Full specs"}</button>`;
      if(isExp){
        h+=`<div class="specs">`;
        [["Foam",shoe.foam],["Feel",shoe.feel],["Plate",shoe.plate],["Stack",shoe.stack],["Weight",shoe.wt],["Fit",shoe.fit],["Gait",shoe.gait.join(", ")]].forEach(([k,v])=>{
          h+=`<div class="spec-row"><span class="spec-k">${k}</span><span class="spec-v">${v}</span></div>`;
        });
        h+=`</div>`;
      }
      h+=`</div></div>`;
    });
    h+=`<button class="restart-btn" onclick="restart()">Start over</button>
    <div class="disclaimer">Specs sourced from Doctors of Running & RunRepeat lab tests, 2025–2026.<br>CAD prices: actual where available, otherwise ~1.37 rate.</div></div>`;
    app.innerHTML=h;
    return;
  }

  const s=STEPS[state.step];
  const active=activeSteps();
  const ci=active.findIndex(x=>x.id===s.id);
  const progress=Math.round((ci/(active.length-1))*100);
  const isLast=ci===active.length-1;
  const canCont=hasSel(s.id)||s.slider;

  let h=`<div class="header">
    <div class="header-label">Running shoe finder</div>
    <div class="header-title">Find your perfect shoe</div>
    <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-text">Step ${ci+1} of ${active.length}</div>
  </div><div class="body">
  <div class="step-label">${s.label}</div>`;

  if(s.slider){
    const val=state.profile[s.id];
    const isCAD=s.id==="budget";
    const disp=isCAD?`$${val} CAD (~$${Math.round(val/CAD)} USD)`:`${val} km / week`;
    h+=`<div class="step-hint">${isCAD?"Max budget per shoe":"How many km do you run per week?"}</div>
    <div style="height:8px"></div>
    <div class="slider-row">
      <span class="slider-label">${isCAD?"Max budget":"Weekly km"}</span>
      <span class="slider-val">${disp}</span>
    </div>
    <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${val}" oninput="sliderChange('${s.id}',this.value)">
    <div class="slider-ticks">
      <span>${isCAD?"$100":"5 km"}</span>
      <span>${isCAD?"$265":"77 km"}</span>
      <span>${isCAD?"$430":"150 km"}</span>
    </div>
    ${isLast?`<button class="btn-primary" onclick="getResults()">Find my shoes</button>`:`<button class="btn-primary" onclick="advance()">Continue</button>`}`;
  }else{
    const isM=s.multi;
    const selCount=(state.profile[s.id]||[]).length;
    const atMax=s.max&&selCount>=s.max;
    if(isM){
      const mx=s.max?` (max ${s.max})`:"";
      h+=`<div class="step-hint">Choose all that apply${mx}.</div>
      <div class="multi-hint">${atMax?`Maximum of ${s.max} selected.`:"Select one or more, then tap Continue."}</div>`;
    }else{
      h+=`<div class="step-hint">Choose the option that best describes you.</div><div style="height:8px"></div>`;
    }
    h+=`<div class="opts">`;
    s.opts.forEach(o=>{
      const sel=isSel(s.id,o.v);
      const blocked=atMax&&!sel;
      h+=`<button class="opt${sel?" sel":""}" onclick="${blocked?"":"toggleVal('"+s.id+"','"+o.v+"')"}" style="${blocked?"opacity:.35;pointer-events:none;":""}">`;
      if(isM)h+=`<div class="check">${sel?"✓":""}</div>`;
      h+=`${o.l}</button>`;
    });
    h+=`</div>`;
    if(isM&&canCont){
      h+=isLast
        ?`<button class="btn-primary" onclick="getResults()">Find my shoes</button>`
        :`<button class="btn-primary" onclick="advance()">Continue →</button>`;
    }
  }

  if(ci>0)h+=`<button class="btn-back" onclick="goBack()">← Back</button>`;
  h+=`</div>`;
  app.innerHTML=h;
}

window.toggleVal=toggleVal;
window.sliderChange=(k,v)=>{state.profile[k]=parseInt(v);render();};
window.advance=advance;
window.goBack=goBack;
window.getResults=getResults;
window.restart=restart;
window.toggleExpand=id=>{state.expanded=state.expanded===id?null:id;render();};

render();
</script>
</body>
</html>
