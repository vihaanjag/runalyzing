<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#111;min-height:100vh}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.header{background:#111;color:#fff;padding:20px 20px 16px;flex-shrink:0}
.header-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.header-title{font-size:20px;font-weight:600;margin-bottom:12px}
.progress-track{height:3px;background:rgba(255,255,255,.2);border-radius:2px}
.progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .3s}
.progress-text{font-size:11px;opacity:.5;margin-top:5px}
.body{padding:24px 20px;flex:1}
.step-label{font-size:17px;font-weight:600;margin-bottom:4px}
.step-hint{font-size:12px;color:#888;margin-bottom:6px}
.multiselect-hint{font-size:11px;color:#aaa;margin-bottom:16px;font-style:italic}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;text-align:left;transition:all .12s;display:flex;align-items:center;gap:10px;color:#222}
.opt:hover{border-color:#bbb;background:#fafafa}
.opt.sel{border:1.5px solid #111;background:#111;color:#fff}
.opt .check{width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.opt.sel .check{background:#fff;border-color:#fff;color:#111}
.slider-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.slider-label{font-size:13px;color:#666}
.slider-val{font-size:18px;font-weight:600}
input[type=range]{width:100%;margin-bottom:8px;accent-color:#111}
.slider-ticks{display:flex;justify-content:space-between;font-size:10px;color:#bbb;margin-bottom:20px}
.btn-primary{width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px}
.btn-primary:hover{background:#333}
.btn-back{background:none;border:none;cursor:pointer;font-size:12px;color:#aaa;margin-top:16px;padding:0;display:block}
.results-header{background:#111;color:#fff;padding:20px 20px 16px}
.results-body{padding:16px}
.card{border:1px solid #e0e0e0;border-radius:12px;margin-bottom:12px;overflow:hidden}
.card.top{border:2px solid #111}
.card-top-badge{background:#f0f0f0;padding:4px 12px;font-size:10px;font-weight:600;color:#555;letter-spacing:.06em;border-bottom:1px solid #e0e0e0}
.card-body{padding:14px}
.card-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.brand-name{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}
.shoe-name{font-size:15px;font-weight:600}
.price-block{text-align:right}
.price{font-size:15px;font-weight:600}
.match{font-size:10px;color:#999;margin-top:1px}
.best-for{font-size:12px;color:#666;line-height:1.5;margin-bottom:10px}
.pills{margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px}
.pill{display:inline-block;font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid #e0e0e0;color:#555}
.expand-btn{background:none;border:none;cursor:pointer;font-size:11px;color:#888;padding:0}
.specs{margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0}
.spec-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid #f8f8f8}
.spec-key{color:#aaa}
.spec-val{color:#222;font-weight:500;text-align:right;max-width:62%}
.restart-btn{width:100%;padding:13px;background:#111;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
.disclaimer{font-size:10px;color:#bbb;text-align:center;margin-top:12px;line-height:1.5}
</style>
</head>

function scoreShoe(shoe,p){
  let s=0;
  if(shoe.exp.includes(p.experience))s+=15;
  const purposes=p.purpose.length?p.purpose:["daily"];
  if(purposes.includes("versatile")){
    if(shoe.purpose.some(x=>["daily","performance","recovery"].includes(x)))s+=20;
  }
  if(purposes.includes("race")&&shoe.purpose.includes("race"))s+=20;
  if(purposes.includes("daily")&&shoe.purpose.includes("daily"))s+=15;
  if(purposes.includes("recovery")&&shoe.purpose.includes("recovery"))s+=15;
  if(purposes.includes("performance")&&shoe.purpose.some(x=>["performance","race"].includes(x)))s+=12;
  if(purposes.includes("new")&&shoe.purpose.includes("daily"))s+=20;
  const dists=p.distance.length?p.distance:["5k"];
  if(dists.some(d=>shoe.dist.includes(d)))s+=15;
  if(p.gait==="neutral"&&shoe.gait.includes("neutral"))s+=12;
  else if(p.gait==="mild-over"&&(shoe.support==="Stability"||shoe.gait.includes("mild-over")))s+=12;
  else if(p.gait==="moderate-over"&&shoe.support==="Stability")s+=15;
  else if(p.gait==="high-over"&&shoe.support==="Max Stability")s+=18;
  else if(p.gait==="supination"&&shoe.gait.includes("neutral"))s+=8;
  else if(p.gait==="unknown")s+=6;
  if(shoe.widths.includes(p.width))s+=8;
  const cushions=p.cushion.length?p.cushion:["medium"];
  if(cushions.includes("max")&&shoe.cushion==="Maximum")s+=12;
  if(cushions.includes("medium")&&["High","Moderate"].includes(shoe.cushion))s+=10;
  if(cushions.includes("minimal")&&shoe.cushion==="Moderate")s+=8;
  const foams=p.foam.length?p.foam:["snappy"];
  if(foams.includes("snappy")&&(shoe.foamT.includes("snappy")||shoe.foamT.includes("springy")))s+=8;
  if(foams.includes("soft")&&shoe.foamT.includes("soft"))s+=8;
  if(foams.includes("firm")&&shoe.foamT.includes("firm"))s+=8;
  const brands=p.brand||[];
  if(brands.length>0&&!brands.includes("none")){
    if(brands.includes(shoe.brand))s+=20;
    else s-=30;
  }
  const budgetUSD=Math.round(p.budget/CAD);
  if(shoe.priceUSD<=budgetUSD)s+=10;
  else if(shoe.priceUSD<=budgetUSD*1.1)s+=5;
  if(p.weekly>=60&&shoe.cushion==="Maximum")s+=4;
  if(p.weekly<30&&shoe.cushion==="Moderate")s+=3;
  if(p.arch!=="unknown"&&shoe.arch.includes(p.arch))s+=5;
  else if(p.arch==="unknown")s+=3;
  if(p.footstrike==="heel"&&shoe.gait.includes("heel"))s+=4;
  if(p.footstrike==="fore"&&shoe.support==="Neutral"&&shoe.drop<=6)s+=4;
  if(p.footstrike==="mid"&&shoe.drop<=7&&shoe.support==="Neutral")s+=3;
  return s;
}

function pct(n){return Math.min(97,Math.round(n/1.4));}

function isMulti(stepId){const st=STEPS.find(s=>s.id===stepId);return st&&st.multi;}

function toggleVal(key,val){
  if(isMulti(key)){
    const step=STEPS.find(s=>s.id===key);
    const max=step&&step.max?step.max:99;
    let arr=[...(state.profile[key]||[])];
    const i=arr.indexOf(val);
    if(i>=0){
      arr.splice(i,1);
    }else{
      if(key==="brand"&&val==="none"){arr=["none"];}
      else if(key==="brand"&&arr.includes("none")){arr=arr.filter(x=>x!=="none");if(arr.length<max)arr.push(val);}
      else if(arr.length<max){arr.push(val);}
    }
    state.profile[key]=arr;
  }else{
    state.profile[key]=val;
  }
  render();
  if(!isMulti(key))setTimeout(()=>{advance();},180);
}

function isSelected(key,val){
  if(isMulti(key))return(state.profile[key]||[]).includes(val);
  return state.profile[key]===val;
}

function hasSelection(key){
  if(isMulti(key))return(state.profile[key]||[]).length>0;
  return!!state.profile[key];
}

function advance(){
  if(state.step<STEPS.length-1){state.step++;render();}
}

function getResults(){
  const scored=DB.map(s=>({...s,_s:scoreShoe(s,state.profile)})).sort((a,b)=>b._s-a._s).slice(0,5);
  state.results=scored;render();
}

function restart(){
  state={step:0,profile:{gender:"",experience:"",purpose:[],distance:[],gait:"",footstrike:"",arch:"",width:"",cushion:[],foam:[],brand:[],weekly:40,budget:250},results:null,expanded:null};
  render();
}

function render(){
  const app=document.getElementById("app");
  if(!app)return;

  if(state.results){
    let html=`<div class="results-header"><div class="header-label">Your top matches</div><div class="header-title">Recommended shoes</div></div><div class="results-body">`;
    state.results.forEach((shoe,i)=>{
      const bc=BC[shoe.brand]||"#333";
      const isTop=i===0;
      const isExp=state.expanded===shoe.id;
      const cadPrice=Math.round(shoe.priceUSD*CAD);
      html+=`<div class="card${isTop?" top":""}">`;
      if(isTop)html+=`<div class="card-top-badge">TOP PICK</div>`;
      html+=`<div class="card-body">
        <div class="card-row1">
          <div><div class="brand-name" style="color:${bc}">${shoe.brand}</div><div class="shoe-name">${shoe.model}</div></div>
          <div class="price-block"><div class="price">$${shoe.priceUSD} USD</div><div class="match">~$${cadPrice} CAD &nbsp;|&nbsp; ${pct(shoe._s)}% match</div></div>
        </div>
        <div class="best-for">${shoe.best}</div>
        <div class="pills">
          <span class="pill">${shoe.cushion}</span>
          <span class="pill">${shoe.feel}</span>
          <span class="pill">Drop ${shoe.drop}mm</span>
          <span class="pill">${shoe.support}</span>
          <span class="pill">${shoe.plate!=="None"&&shoe.plate!=="None (plateless)"&&shoe.plate!=="None (SpeedRoll geometry)"?"Plated":"No plate"}</span>
        </div>
        <button class="expand-btn" onclick="toggleExpand(${shoe.id})">${isExp?"▲ Less detail":"▼ Full specs"}</button>`;
      if(isExp){
        html+=`<div class="specs">`;
        [["Foam",shoe.foam],["Feel",shoe.feel],["Plate",shoe.plate],["Stack",shoe.stack],["Weight",shoe.wt],["Fit",shoe.fit],["Gait",shoe.gait.join(", ")]].forEach(([k,v])=>{
          html+=`<div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`;
        });
        html+=`</div>`;
      }
      html+=`</div></div>`;
    });
    html+=`<button class="restart-btn" onclick="restart()">Start over</button>
    <div class="disclaimer">Specs sourced from Doctors of Running & RunRepeat lab testing, 2025–2026. Prices in USD; CAD shown at ~1.37 rate (approximate).</div>
    </div>`;
    app.innerHTML=html;
    return;
  }

  const s=STEPS[state.step];
  const progress=Math.round((state.step/(STEPS.length-1))*100);
  const canAdvance=hasSelection(s.id)||s.slider;

  let html=`<div class="header">
    <div class="header-label">Running shoe finder</div>
    <div class="header-title">Find your perfect shoe</div>
    <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-text">Step ${state.step+1} of ${STEPS.length}</div>
  </div><div class="body">
    <div class="step-label">${s.label}</div>`;

  if(s.slider){
    const val=state.profile[s.id];
    const isCAD=s.id==="budget";
    const displayVal=isCAD?`$${val} CAD (~$${Math.round(val/CAD)} USD)`:val+" km";
    html+=`<div class="step-hint">${isCAD?"What is your maximum budget per shoe?":"How many km do you run per week on average?"}</div>
    <div style="height:8px"></div>
    <div class="slider-row"><span class="slider-label">${isCAD?"Max budget":"Weekly km"}</span><span class="slider-val">${displayVal}</span></div>
    <input type="range" min="${s.min}" max="${s.max}" step="${s.step}" value="${val}" oninput="sliderChange('${s.id}',this.value)">
    <div class="slider-ticks"><span>${isCAD?"$":""} ${s.min}</span><span>${isCAD?"$":""} ${Math.round((s.min+s.max)/2)}</span><span>${isCAD?"$":""} ${s.max}</span></div>`;
    if(state.step===STEPS.length-1){
      html+=`<button class="btn-primary" onclick="getResults()">Find my shoes</button>`;
    }else{
      html+=`<button class="btn-primary" onclick="advance()">Continue</button>`;
    }
  }else{
    if(s.multi){
      const selectedCount=(state.profile[s.id]||[]).length;
      const maxMsg=s.max?` (max ${s.max})`:` `;
      const atMax=s.max&&selectedCount>=s.max;
      html+=`<div class="step-hint">Choose all that apply${maxMsg}.</div><div class="multiselect-hint">${atMax?`Maximum of ${s.max} selected.`:"Select one or more, then tap Continue."}</div>`;
    }else{
      html+=`<div class="step-hint">Choose the option that best describes you.</div><div style="height:8px"></div>`;
    }
    html+=`<div class="opts">`;
    s.opts.forEach(o=>{
      const sel=isSelected(s.id,o.v);
      const atMax=s.max&&(state.profile[s.id]||[]).length>=s.max&&!sel;
      html+=`<button class="opt${sel?" sel":""}${atMax?" disabled":""}" onclick="${atMax?"":"toggleVal('"+s.id+"','"+o.v+"')"}" style="${atMax?"opacity:0.35;cursor:not-allowed;":""}">`;
      if(s.multi)html+=`<div class="check">${sel?"✓":""}</div>`;
      html+=`${o.l}</button>`;
    });
    html+=`</div>`;
    if(s.multi&&canAdvance){
      html+=`<button class="btn-primary" onclick="advance()">Continue →</button>`;
    }
  }

  if(state.step>0){
    html+=`<button class="btn-back" onclick="goBack()">← Back</button>`;
  }
  html+=`</div>`;
  app.innerHTML=html;
}

window.toggleExpand=id=>{state.expanded=state.expanded===id?null:id;render();};
window.sliderChange=(k,v)=>{state.profile[k]=parseInt(v);render();};
window.advance=advance;
window.goBack=()=>{state.step=Math.max(0,state.step-1);render();};
window.toggleVal=toggleVal;
window.getResults=getResults;
window.restart=restart;

render();
</script>
</body>
</html>
